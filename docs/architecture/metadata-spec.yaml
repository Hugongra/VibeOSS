# VibeOS — Vibe-JSON Metadata Specification v1.0.0
# ============================================================
# This document defines the standard for metadata schemas that
# power the VibeOS platform. Every entity, view, and action in
# the system is described by a Vibe-JSON document conforming to
# this specification.

vibeJson:
  version: "1.0.0"
  description: >
    The Vibe-JSON standard is a declarative metadata format that
    describes business applications. It serves as the single source
    of truth for database structure, API behavior, and UI rendering.

# ============================================================
# Module Schema
# ============================================================
module:
  type: object
  required: [version, module, description, entities, views]
  properties:
    version:
      type: string
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: Semantic version of the module schema.

    module:
      type: string
      pattern: "^[a-z][a-z0-9_-]*$"
      description: Unique kebab-case identifier for the module.

    description:
      type: string
      description: Human-readable description of the module's purpose.

    entities:
      type: array
      minItems: 1
      items:
        $ref: "#/entity"
      description: The data entities defined by this module.

    views:
      type: array
      minItems: 1
      items:
        $ref: "#/view"
      description: UI views for displaying and interacting with entities.

    navigation:
      type: array
      items:
        type: object
        properties:
          label: { type: string }
          icon: { type: string }
          view: { type: string }

# ============================================================
# Entity Schema
# ============================================================
entity:
  type: object
  required: [name, label, pluralLabel, description, fields, timestamps, softDelete]
  properties:
    name:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
      description: snake_case identifier.
    label: { type: string }
    pluralLabel: { type: string }
    description: { type: string }
    icon: { type: string }
    timestamps: { type: boolean }
    softDelete: { type: boolean }
    fields:
      type: array
      minItems: 1
      items:
        $ref: "#/field"

# ============================================================
# Field Schema
# ============================================================
field:
  type: object
  required: [name, label, type, required]
  properties:
    name:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
    label: { type: string }
    type:
      type: string
      enum:
        - text
        - number
        - boolean
        - date
        - datetime
        - email
        - url
        - phone
        - currency
        - percentage
        - select
        - multi-select
        - relation
        - file
        - rich-text
        - json
    required: { type: boolean }
    unique: { type: boolean }
    defaultValue: {}
    description: { type: string }
    options:
      type: array
      items: { type: string }
    relation:
      type: object
      properties:
        entity: { type: string }
        field: { type: string }
        type:
          type: string
          enum: [one-to-one, one-to-many, many-to-many]
    validation:
      type: object
      properties:
        min: { type: number }
        max: { type: number }
        pattern: { type: string }
        message: { type: string }

# ============================================================
# View Schema
# ============================================================
view:
  type: object
  required: [name, label, entity, layout]
  properties:
    name: { type: string }
    label: { type: string }
    entity: { type: string }
    layout:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [table, form, detail, card, list, kanban, chart, stat, custom]
        columns:
          type: array
          items: { type: string }
        filters:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              operator:
                type: string
                enum: [eq, neq, gt, lt, gte, lte, contains, in]
              value: {}
        sorting:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              direction:
                type: string
                enum: [asc, desc]
        groupBy: { type: string }
        pageSize: { type: integer }
    actions:
      type: array
      items:
        $ref: "#/action"

# ============================================================
# Action Schema
# ============================================================
action:
  type: object
  required: [name, label, type]
  properties:
    name: { type: string }
    label: { type: string }
    type:
      type: string
      enum: [create, update, delete, navigate, webhook, custom]
    icon: { type: string }
    confirmation: { type: string }
    targetEntity: { type: string }
    targetUrl: { type: string }

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fafafa"/>
      <stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.08"/>

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeoss-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibeoss
    volumes:
      - vibeoss_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibeoss"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vibeoss_pg_data:
